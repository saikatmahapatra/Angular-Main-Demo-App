<h1 class="page-title">2-Factor Authentication</h1>
<form [formGroup]="loginForm" class="app-form unauth-form-max-w" (ngSubmit)="onSubmit()">
  <div class="row mb-3">
    <div class="col">

      <div class="card p-2">
        <h6>Please enter the one time password <br> to verify your account</h6>
        <div> <span>A code has been sent to</span> <small> 987****9897</small> </div>
        <div id="otp" class="inputs d-flex flex-row justify-content-center mt-2">
          <app-input [type]="'text'" [name]="'otpFirst'" [inputId]="'otpFirst'" [maxLength]="1"
            class="d-block" style="width: 3rem;"></app-input>
          <app-input [type]="'text'" [name]="'otpSecond'" [inputId]="'otpSecond'" [maxLength]="1"
            class="d-block" style="width: 3rem;"></app-input>
          <app-input [type]="'text'" [name]="'otpThird'" [inputId]="'otpThird'" [maxLength]="1"
            class="d-block" style="width: 3rem;"></app-input>
          <app-input [type]="'text'" [name]="'otpFourth'" [inputId]="'otpFourth'" [maxLength]="1"
            class="d-block" style="width: 3rem;"></app-input>
          <app-input [type]="'text'" [name]="'otpFifth'" [inputId]="'otpFifth'" [maxLength]="1"
            class="d-block" style="width: 3rem;"></app-input>
          <app-input [type]="'text'" [name]="'otpSixth'" [inputId]="'otpSixth'" [maxLength]="1"
            class="d-block" style="width: 3rem;"></app-input>
        </div>
      </div>

      <div class="card-2">
        <div class="content d-flex justify-content-center align-items-center"> <span>Didn't get the code</span> <a
      href="#" class="text-decoration-none ms-3">Resend(1/3)</a> </div>
    </div>

  </div>
</div>

<div class="d-grid gap-2">
  <app-button [type]="'submit'" [label]="'Validate'" [disabled]="loading" [loading]="loading"
    [class]="'w-100 d-block'"></app-button>
</div>
<div class="my-3"><a routerLink="../login">Back to Login Page</a></div>
</form>
