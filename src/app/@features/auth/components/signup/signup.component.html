<h1 class="page-title h3">
    {{ 'auth.signup.titleSignup' | translate }}
</h1>
<div class="mb-3">
    <label class="form-label" for="firstName">
        {{ 'auth.signup.firstName' | translate }}
    </label>
    <app-input [type]="'text'" [name]="'firstName'" [inputId]="'firstName'" class="w-100 d-block"></app-input>
</div>
<div class="mb-3">
    <label class="form-label" for="lastName">
        {{ 'auth.signup.lastName' | translate }}
    </label>
    <app-input [type]="'text'" [name]="'lastName'" [inputId]="'lastName'" class="w-100 d-block"></app-input>
</div>
<div class="mb-3">
    <label class="form-label" for="email">
        {{ 'auth.signup.email' | translate }}
    </label>
    <app-input [type]="'email'" [name]="'email'" [inputId]="'email'" class="w-100 d-block"></app-input>
</div>
<div class="mb-3">
    <label class="form-label" for="password">
        {{ 'auth.signup.password' | translate }}
    </label>
    <app-input [type]="'password'" [name]="'password'" [inputId]="'password'" class="w-100 d-block"></app-input>
</div>
<div class="mb-3">
    <label class="form-label" for="confirmPassword">
        {{ 'auth.signup.confirmPassword' | translate }}
    </label>
    <app-input [type]="'password'" [name]="'confirmPassword'" [inputId]="'confirmPassword'" class="w-100 d-block"></app-input>
</div>
<div class="mb-3 d-flex align-items-center">
    <app-checkbox [inputId]="'terms'" [label]="'auth.signup.termsAndConditions' | translate"></app-checkbox>
</div>
<div class="mb-3">
    <app-button [type]="'submit'" [label]="'Sign Up'" [class]="'w-100 d-block'"></app-button>
</div>
<div class="mb-3 small">
    <p class=""> {{ 'auth.signup.haveAccount' | translate }}
        <a [routerLink]="['../login']">{{ 'auth.signup.loginHere' | translate }}</a>.
    </p>
</div>
<div class="mb-3 small">
    <p>
        {{ 'auth.signup.bySigningUp' | translate }} <a [routerLink]="['/terms']">{{ 'auth.signup.tnc' |
            translate
            }}</a> and <a [routerLink]="['/privacy']">{{ 'auth.signup.privacy' | translate }}</a>.
    </p>
</div>
