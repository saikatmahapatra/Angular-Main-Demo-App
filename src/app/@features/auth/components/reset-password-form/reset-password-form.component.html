<h1 class="page-title h3">
    {{ 'auth.titleResetPassword' | translate }}
</h1>
<form [formGroup]="resetPasswordForm" (ngSubmit)="onSubmit()">
    <div class="mb-3">
        <label for="otp" class="form-label">{{'auth.labelOtp' | translate}}</label>
        <input pInputText type="password" formControlName="otp" aria-label="{{ 'auth.aria.labelOTP' | translate }}"
            aria-describedby="{{ 'auth.aria.labelOTP' | translate }}" class="w-100 d-block" id="otp" />
        <app-validation-error [control]="f['otp']"></app-validation-error>
    </div>
    <div class="mb-3">
        <label for="email" class="form-label">{{'auth.labelEmail' |
            translate}}</label>
        <input pInputText type="text" formControlName="email" aria-label="{{ 'auth.aria.labelEmail' | translate }}"
            aria-describedby="{{ 'auth.aria.labelEmail' | translate }}" class="w-100 d-block" id="email" />
        <app-validation-error [control]="f['email']"></app-validation-error>
    </div>
    <div class="mb-3">
        <label for="password" class="form-label">{{'auth.labelNewPassword' |
            translate}}</label>
        <input pInputText type="password" formControlName="password"
            aria-label="{{ 'auth.aria.labelNewPassword' | translate }}"
            aria-describedby="{{ 'auth.aria.labelNewPassword' | translate }}" class="w-100 d-block" id="password" />
        <app-validation-error [control]="f['password']"></app-validation-error>
    </div>

    <div class="mb-3">
        <label for="confirmPassword" class="form-label">{{'auth.labelConfirmPassword' |
            translate}}</label>
        <input pInputText type="password" formControlName="confirmPassword"
            aria-label="{{ 'auth.aria.labelConfirmPassword' | translate }}"
            aria-describedby="{{ 'auth.aria.labelConfirmPassword' | translate }}" class="w-100 d-block"
            id="confirmPassword" />
        <app-validation-error [control]="f['confirmPassword']"></app-validation-error>
    </div>

    <app-button [type]="'submit'" [label]="('button.submit' | translate)"
        [disabled]="loading || resetPasswordForm.invalid" [loading]="loading" [class]="'w-100 d-block'"></app-button>

    <p class="pt-4"><a [routerLink]="['../login']">{{ 'auth.goBackToLogin' | translate }}</a>
    </p>
</form>
