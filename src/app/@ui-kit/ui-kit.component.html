<div class="p-3">
    <h1>UI/UX Design System</h1>
    <div>PrimeNG based design system components</div>

    <h3>Buttons</h3>
    <app-button [severity]="'primary'" [label]="'Primary'" class="mr-3"></app-button>
    <app-button [severity]="'primary'" [rounded]="true" class="mr-3">Rounded</app-button>
    <app-button [severity]="'primary'" [variant]="'text'" class="mr-3">Text Button</app-button>
    <app-button [severity]="'primary'" [raised]="true" class="mr-3">Raised Button</app-button>
    <app-button [severity]="'primary'" [disabled]="true" class="mr-3">Disabled</app-button>
    <app-button [severity]="'secondary'" [label]="'Secondary'" class="mr-3"></app-button>
    <app-button [severity]="'success'" [label]="'Success'" class="mr-3"></app-button>
    <app-button [severity]="'danger'" [label]="'Danger'" class="mr-3"></app-button>
    <app-button [severity]="'info'" [label]="'Info'" class="mr-3"></app-button>
    <app-button [severity]="'warn'" [label]="'Warning'" class="mr-3"></app-button>
</div>
