<app-header></app-header>
<div class="p-3 mt-5">
    <div class="my-4">
        <h1>UI Kit - Design System</h1>
        <div>PrimeNG based UI components</div>

        <h3>Buttons</h3>
        <app-button [label]="'Primary'" class="me-2" (clickAction)="saveItem()"></app-button>
        <app-button [rounded]="true" class="me-2">Rounded</app-button>
        <app-button [icon]="'pi pi-check'" class="me-2"></app-button>
        <app-button [icon]="'pi pi-check'" [rounded]="true" [variant]="'outlined'" class="me-2"></app-button>
        <app-button class="me-2">
            <app-icon [name]="'pi pi-check'" [styleCSS]="{fontSize: '1rem'}"></app-icon>
            Custom Icon
        </app-button>
        <app-button [variant]="'outlined'" class="me-2">Outlined</app-button>
        <app-button [variant]="'text'" class="me-2">Text Button</app-button>
        <app-button [raised]="true" class="me-2">Raised Button</app-button>
        <app-button [disabled]="true" class="me-2">Disabled</app-button>
        <app-button [icon]="'pi pi-pencil'" [variant]="'outlined'" class="me-2"></app-button>
        <app-button [severity]="'danger'" [icon]="'pi pi-trash'" [variant]="'outlined'" class="me-2"></app-button>
        <app-button [severity]="'success'" [label]="'Success'" class="me-2"></app-button>
        <app-button [severity]="'danger'" [label]="'Danger'" class="me-2"></app-button>
        <app-button [severity]="'info'" [label]="'Info'" class="me-2"></app-button>
        <app-button [severity]="'warn'" [label]="'Warning'" class="me-2"></app-button>
    </div>

    <div class="my-4">
        <h3>Form Controls</h3>
        <form>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <app-input [type]="'text'" [name]="'firstName'" [label]="'First Name'" [placeholder]="'Enter your first name'"
                        [(ngModel)]="myForm.firstname"></app-input>
                </div>
                <div class="col-md-6 mb-3">
                    <app-input [type]="'text'" [name]="'lastName'" [label]="'Last Name'" [placeholder]="'Enter your last name'"
                        [(ngModel)]="myForm.lastname"></app-input>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <app-input [type]="'email'" [name]="'email'" [label]="'Email'" [placeholder]="'Enter your email'"
                        [(ngModel)]="myForm.email"></app-input>
                </div>
                <div class="col-md-6 mb-3">
                    <app-input [type]="'number'" [name]="'age'" [label]="'Age (InputNumber)'" [placeholder]="'Enter your age'"
                        [(ngModel)]="myForm.age" [min]="18" [max]="65"></app-input>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <app-input [type]="'tel'" [name]="'mobile'" [label]="'Mobile'" [placeholder]="'Enter your mobile number'"
                        [(ngModel)]="myForm.mobile" [minLength]="10" [maxLength]="10"></app-input>
                </div>
                <div class="col-md-6 mb-3">
                    <app-radio-button [name]="'gender'" [label]="'Gender'" [options]="genderOptions"
                        [(ngModel)]="myForm.gender"></app-radio-button>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <app-select [name]="'country'" [label]="'Country (Single Select)'" [placeholder]="'Select country'"
                        [options]="countryOptions" [filter]="true" [(ngModel)]="myForm.country"></app-select>
                </div>
                <div class="col-md-6 mb-3">
                    <app-select [name]="'skills'" [label]="'Skills (Multi Select Chips)'" [placeholder]="'Select skills'"
                        [options]="skillOptions" [multiple]="true" [filter]="true" [(ngModel)]="myForm.skills"></app-select>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <app-checkbox [name]="'termsAccepted'" [label]="'Accept terms and conditions'"
                        [(ngModel)]="myForm.termsAccepted"></app-checkbox>
                </div>
            </div>

            <div class="row">
                <div class="col-md-12 mb-3">
                    <app-text-area [name]="'bio'" [label]="'Bio'" [placeholder]="'Enter your bio (max 250 characters)'"
                        [(ngModel)]="myForm.bio" [maxLength]="250"></app-text-area>
                </div>
            </div>

            <div class="my-3">
                <pre> {{ myForm | json }} </pre>
            </div>
        </form>
    </div>

    <div class="my-4">
        <h3>Charts</h3>
        <app-charts [title]="'Quarterly Revenue'" [type]="'bar'" [data]="chartData" [options]="chartOptions"></app-charts>
    </div>

    <div class="my-4">
        <h3>Data Grid (Sorting + Row Expansion + Actions)</h3>
        <app-data-grid [caption]="'Employee Summary'" [columns]="employeeColumns" [value]="employeeData" [dataKey]="'id'"
            [expandableRows]="true" [sortMode]="'single'" [actions]="employeeActions"></app-data-grid>
    </div>
</div>
